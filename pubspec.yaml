name: kisi_st2u
description: Flutter wrapper for Kisi Straight-to-Unlock (ST2U) iOS and Android SDKs. Enables NFC tap-to-unlock and Motion Sense door access.
version: 0.1.0
homepage: https://github.com/Fremenkiel/kisi-flutter-st2u-wrapper

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.kisi.st2u
        pluginClass: KisiSt2uPlugin
      ios:
        pluginClass: SwiftKisiSt2uPlugin
